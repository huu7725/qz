const $=id=>document.getElementById(id);
function tst(m,t="ok"){const e=$("tst");e.innerHTML=(t==="ok"?"✅ ":"❌ ")+m;e.className=`toast on ${t}`;clearTimeout(tst._t);tst._t=setTimeout(()=>e.classList.remove("on"),2800);}
function om(id){$(id).classList.add("on")}function cm(id){$(id).classList.remove("on")}
function hr(){const h=new Date().getHours();return h<12?"Chào buổi sáng":h<18?"Chào buổi chiều":"Chào buổi tối"}

// AUTH helpers
function stab(t){document.querySelectorAll(".atb").forEach((e,i)=>e.classList.toggle("on",["login","register"][i]===t));ss(t);}
function ss(s){document.querySelectorAll(".asc").forEach(e=>e.classList.remove("on"));$("sc-"+s).classList.add("on");const sh=s==="login"||s==="register";$("at").style.display=sh?"flex":"none";}
function te(id,el){const i=$(id);i.type=i.type==="password"?"text":"password";el.textContent=i.type==="password"?"👁":"🙈";}
function ce(id){const e=$(id);if(e){e.classList.remove("on");e.textContent="";}}
function se(id,m){const e=$(id);e.textContent=m;e.classList.add("on");}
function cs2(v){const b=$("sb2"),l=$("slb");if(!b)return;if(!v.length){b.style.width="0";l.textContent="";return;}let sc=0;if(v.length>=6)sc++;if(v.length>=10)sc++;if(/[A-Z]/.test(v))sc++;if(/[0-9]/.test(v))sc++;if(/[^A-Za-z0-9]/.test(v))sc++;const c=[["0%","",""],["20%","#ef4444","Yếu"],["40%","#f97316","Trung bình"],["60%","#eab308","Khá"],["80%","#22c55e","Tốt"],["100%","#10b981","Rất mạnh"]];b.style.width=c[sc][0];b.style.background=c[sc][1];l.textContent=c[sc][2];l.style.color=c[sc][1];}

function gu(){try{return JSON.parse(localStorage.getItem("cq_us")||"{}")}catch{return {}}}
function su2(u){localStorage.setItem("cq_us",JSON.stringify(u))}

function dl(){
  const em=$("le").value.trim(),pw=$("lp").value;
  if(!em||!pw){se("lerr","Vui lòng điền đầy đủ thông tin");return;}
  if(!/\S+@\S+\.\S+/.test(em)){se("lerr","Email không hợp lệ");return;}
  const us=gu();if(!us[em]){se("lerr","Email chưa được đăng ký");return;}
  if(us[em].pass!==btoa(pw)){se("lerr","Mật khẩu không đúng");return;}
  ls({email:em,name:us[em].name});
}
function dr(){
  const nm=$("rn").value.trim(),em=$("re").value.trim(),pw=$("rp").value,pw2=$("rp2").value;
  if(!nm||!em||!pw||!pw2){se("rerr","Vui lòng điền đầy đủ thông tin");return;}
  if(!/\S+@\S+\.\S+/.test(em)){se("rerr","Email không hợp lệ");return;}
  if(pw.length<6){se("rerr","Mật khẩu phải ít nhất 6 ký tự");return;}
  if(pw!==pw2){se("rerr","Mật khẩu không khớp");return;}
  const us=gu();if(us[em]){se("rerr","Email đã được đăng ký");return;}
  us[em]={name:nm,pass:btoa(pw)};su2(us);ls({email:em,name:nm});
}
function df(){
  const em=$("fe").value.trim();
  if(!em){se("ferr","Vui lòng nhập email");return;}
  if(!/\S+@\S+\.\S+/.test(em)){se("ferr","Email không hợp lệ");return;}
  const us=gu();
  $("fok").textContent=us[em]?`Đã gửi link đặt lại đến ${em}. (Demo: mật khẩu mới là "123456")`:`Nếu ${em} tồn tại, bạn sẽ nhận email.`;
  if(us[em]){us[em].pass=btoa("123456");su2(us);}
  ss("forgot-ok");
}
function dg2(){ls({email:"guest@cobraq.vn",name:"Khách"});}
function ls(u){
  S.user=u;localStorage.setItem("cq_u",JSON.stringify(u));
  $("aw").classList.add("gone");
  setTimeout(()=>{$("aw").style.display="none";$("app").classList.add("on");uui();lst().then(()=>lh().then(()=>rp2()));},480);
}
function lo(){
  localStorage.removeItem("cq_u");S.user=null;cm("pm");
  $("aw").style.display="flex";setTimeout(()=>$("aw").classList.remove("gone"),10);
  $("app").classList.remove("on");$("le").value="";$("lp").value="";stab("login");tst("Đã đăng xuất");
}
function uui(){
  if(!S.user)return;const n=S.user.name||"Bạn";
  $("sav").textContent=n[0]?.toUpperCase()||"C";$("snm").textContent=n;
  $("mav").textContent=n[0]?.toUpperCase()||"C";$("mnm").textContent=n;$("mem").textContent=S.user.email||"";
  if($("mni"))$("mni").value=n;
}
function pn(v){$("mav").textContent=v[0]?.toUpperCase()||"C";$("mnm").textContent=v||"CobraQ";}
function sv(){
  const v=$("mni").value.trim();if(!v)return;
  S.user.name=v;localStorage.setItem("cq_u",JSON.stringify(S.user));
  const us=gu();if(us[S.user.email]){us[S.user.email].name=v;su2(us);}
  uui();cm("pm");tst("Đã lưu tên!");if(S.pg==="dashboard")rp2();
}

function nv(p){
  S.pg=p;document.querySelectorAll(".sbi").forEach(e=>e.classList.remove("on"));
  const e=$("n-"+p);if(e)e.classList.add("on");
  if(p==="history")lh().then(rp2);else if(p==="dashboard")lst().then(rp2);else rp2();
  $("main").scrollTo({top:0,behavior:"smooth"});
}

async function lst(){try{const r=await fetch(`${API}/stats`);S.stats=await r.json();}catch{S.stats={total_questions:0,with_answer:0,total_sessions:0,avg_score:0,best_score:0};}}
async function lh(){try{const r=await fetch(`${API}/history`);S.hist=(await r.json()).reverse();}catch{S.hist=[];}}

function rp2(){
  const m=$("main");
  ({dashboard:()=>m.innerHTML=rd(),
    "quiz-start":()=>m.innerHTML=rqs(),
    quiz:()=>m.innerHTML=rqz(),
    result:()=>m.innerHTML=rrs(),
    history:()=>m.innerHTML=rht(),
    upload:()=>m.innerHTML=rup(),
    settings:()=>m.innerHTML=rset()})[S.pg]?.();
  if(S.pg==="dashboard")afd();
  if(S.pg==="history")afh();
  if(S.pg==="upload")bd();
  uui();
}

function rd(){
  const s=S.stats,h7=S.hist.slice(0,7).reverse();
  const days=["T2","T3","T4","T5","T6","T7","CN"];
  const cd=days.map((d,i)=>({l:d,v:h7[i]?.score||0}));
  const mx=Math.max(...cd.map(d=>d.v),1);
  const bars=cd.map(d=>{const h=Math.round((d.v/mx)*130);return`<div class="bc"><div class="bar" style="height:${h}px"><div class="btt">${d.v} đúng</div></div><div class="bl">${d.l}</div></div>`;}).join('');
  const cT=S.hist.reduce((a,h)=>a+h.score,0),tT=S.hist.reduce((a,h)=>a+h.total,0);
  const acc=tT?Math.round(cT/tT*100):0,circ=2*Math.PI*42,dash=(acc/100)*circ;
  return`<div class="page"><div class="tb"><div><div style="font-size:12px;color:var(--t3);margin-bottom:2px">${hr()},</div><div class="pt" style="font-size:22px"><span style="color:var(--p)">${S.user?.name||'bạn'}</span> 👋</div></div><div class="tbr"><div class="ib" onclick="nv('upload')">📂</div><div class="ib" onclick="om('pm')">👤</div></div></div>
  <div class="sr stg">
    <div class="sc" onclick="nv('quiz-start')"><div class="sic ip">📚</div><div><div class="sn" style="color:var(--p)">${s.total_questions}</div><div class="sl">Câu hỏi</div><div class="str su">▲ Ngân hàng</div></div></div>
    <div class="sc" onclick="nv('history')"><div class="sic ig">✅</div><div><div class="sn" style="color:var(--g)">${s.total_sessions}</div><div class="sl">Lần thi</div><div class="str su">${s.avg_score}% TB</div></div></div>
    <div class="sc"><div class="sic ia">🏆</div><div><div class="sn" style="color:var(--a)">${s.best_score}%</div><div class="sl">Cao nhất</div><div class="str ${s.best_score>=80?'su':'sd'}">${s.best_score>=80?'Xuất sắc!':'Cố lên!'}</div></div></div>
  </div>
  <div class="dg stg">
    <div class="card c2"><div class="ch2"><div><div class="ct">Kết quả 7 ngày</div><div class="cs">Số câu đúng mỗi buổi</div></div><span class="cbg" style="background:#ede9fe;color:var(--p)">${S.hist.length} lần</span></div><div class="ch" id="bch">${bars}</div></div>
    <div class="uph ${s.total_questions===0?'pls':''}" onclick="nv('upload')"><div class="ui">☁️</div><div class="ut">${s.total_questions===0?'Upload đề thi':'Thêm đề mới'}</div><div class="us">Kéo thả Word / PDF</div><button class="upi">Duyệt qua</button></div>
    <div class="card" style="display:flex;align-items:center;justify-content:center"><div class="sbig"><div class="sbn">${cT}</div><div class="sbd"></div><div class="sbb">${tT}</div><div class="sbl2">Tổng câu đúng</div></div></div>
    <div class="card"><div class="ch2"><div class="ct">Độ chính xác</div></div><div class="dw"><svg width="104" height="104" viewBox="0 0 104 104"><circle class="tcb" cx="52" cy="52" r="42"/><circle cx="52" cy="52" r="42" fill="none" stroke="#f59e0b" stroke-width="10" stroke-dasharray="${(1-acc/100)*circ} ${circ}" stroke-dashoffset="${-dash}" stroke-linecap="round" transform="rotate(-90 52 52)"/><circle cx="52" cy="52" r="42" fill="none" stroke="var(--p)" stroke-width="10" stroke-dasharray="${dash} ${circ}" stroke-linecap="round" transform="rotate(-90 52 52)"/><text x="52" y="48" text-anchor="middle" font-size="15" font-weight="800" fill="var(--t)" font-family="Outfit">${acc}%</text><text x="52" y="62" text-anchor="middle" font-size="9" fill="#9ca3af">chính xác</text></svg><div class="dl"><div class="dli"><div class="dld" style="background:var(--p)"></div><span>${acc}% Đúng</span></div><div class="dli"><div class="dld" style="background:var(--a)"></div><span style="color:var(--t2)">${100-acc}% Sai</span></div><div style="font-size:11px;color:var(--t3);margin-top:4px">${cT}/${tT} câu</div></div></div></div>
    <div class="card"><div class="ch2"><div class="ct">Bắt đầu nhanh</div></div>${[5,10,20].map(n=>`<button class="bo" style="width:100%;margin-bottom:7px;text-align:left" onclick="qs(${n})">${n} câu · ${n*1.5} phút</button>`).join('')}<button class="bp" style="width:100%;margin-top:2px" onclick="nv('quiz-start')">Tuỳ chọn →</button></div>
    <div class="card c2"><div class="ch2"><div class="ct">Lịch sử gần đây</div><button class="bo" style="padding:5px 12px;font-size:12px" onclick="nv('history')">Tất cả</button></div>${S.hist.length===0?'<div style="text-align:center;padding:18px;color:var(--t3);font-size:13px">Chưa có lịch sử</div>':S.hist.slice(0,4).map(h=>{const c=h.percent>=80?"var(--g)":h.percent>=60?"var(--a)":"var(--r)";return`<div style="display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--bd)"><div style="font-family:Outfit;font-size:19px;font-weight:800;color:${c};min-width:44px">${h.percent}%</div><div style="flex:1"><div style="font-size:13px;font-weight:600">${h.score}/${h.total} đúng</div><div style="font-size:11px;color:var(--t3)">${h.date}</div></div><span class="cbg" style="${h.percent>=80?'background:#d1fae5;color:#065f46':h.percent>=60?'background:#fef3c7;color:#92400e':'background:#fee2e2;color:#991b1b'}">${h.percent>=80?'Tốt':h.percent>=60?'Khá':'Ôn thêm'}</span></div>`;}).join('')}
    </div>
  </div></div>`;
}
function afd(){setTimeout(()=>document.querySelectorAll('.bar').forEach(b=>{const h=b.style.height;b.style.height='0';requestAnimationFrame(()=>b.style.height=h);}),80);}

function rqs(){const s=S.stats;return`<div class="page"><div class="tb"><div><div class="pt">Làm bài</div><div class="ps">Chọn số câu và bắt đầu</div></div></div><div style="max-width:520px;margin:0 auto"><div class="card stg"><div class="ct" style="margin-bottom:16px">SỐ CÂU HỎI</div><div class="dg2" style="grid-template-columns:repeat(5,1fr);margin-bottom:22px">${[5,10,15,20,30].map(n=>`<div class="qd" style="height:46px;font-size:13px;border-radius:9px;${S.nq===n?'background:var(--p);color:#fff':''}" onclick="sn(${n})">${n}</div>`).join('')}</div><div style="background:var(--bg);border-radius:11px;padding:14px;margin-bottom:20px;display:flex;gap:22px;justify-content:center"><div style="text-align:center"><div style="font-family:Outfit;font-size:21px;font-weight:800;color:var(--p)">${s.total_questions}</div><div style="font-size:11px;color:var(--t3)">Có sẵn</div></div><div style="width:1px;background:var(--bd)"></div><div style="text-align:center"><div style="font-family:Outfit;font-size:21px;font-weight:800;color:var(--a)">${S.nq}</div><div style="font-size:11px;color:var(--t3)">Sẽ thi</div></div><div style="width:1px;background:var(--bd)"></div><div style="text-align:center"><div style="font-family:Outfit;font-size:21px;font-weight:800;color:var(--g)">${S.nq*1.5}</div><div style="font-size:11px;color:var(--t3)">Phút</div></div></div><button class="bp" style="width:100%;padding:13px;font-size:15px" onclick="sq()" ${s.total_questions===0?'disabled':''}>${s.total_questions===0?'📂 Cần upload đề thi trước':'🚀 Bắt đầu làm bài'}</button>${s.total_questions===0?'<p style="text-align:center;font-size:12px;color:var(--t3);margin-top:9px">Vào <b>Tệp đã tải</b> để upload file</p>':''}</div></div></div>`;}
function sn(n){S.nq=n;rp2();}
async function qs(n){S.nq=n;await sq();}
async function sq(){
  try{const r=await fetch(`${API}/quiz/start?num=${S.nq}`);if(!r.ok){tst("Không đủ câu hỏi!","err");return;}
  const d=await r.json();S.sid=d.session_id;S.qs=d.questions;S.ans={};S.cm={};S.cur=0;S.tl=S.nq*90;S.st=Date.now();
  S.pg="quiz";document.querySelectorAll(".sbi").forEach(e=>e.classList.remove("on"));rp2();stt();}
  catch{tst("Lỗi kết nối server!","err");}
}
function rqz(){
  const q=S.qs[S.cur];if(!q)return'';
  const pc=((S.cur+1)/S.qs.length*100).toFixed(0),m=String(Math.floor(S.tl/60)).padStart(2,'0'),s=String(S.tl%60).padStart(2,'0');
  const w=S.tl<60,ci=2*Math.PI*38,d=(S.tl/(S.nq*90))*ci;
  const chs=q.choices.map(c=>{const sel=S.ans[S.cur]===c.label,cor=S.cm[S.cur];let cl="cb2";if(cor){if(c.label===cor)cl+=" cor";else if(sel)cl+=" wrg";}else if(sel)cl+=" sel";return`<button class="${cl}" onclick="pk('${c.label}')" ${cor?'disabled':''}><span class="cl">${c.label}</span><span>${c.text}</span></button>`;}).join('');
  const dots=S.qs.map((_,i)=>`<div class="qd ${i===S.cur?'cur':S.ans[i]!==undefined?'ans':''}" onclick="gt(${i})">${i+1}</div>`).join('');
  return`<div class="page"><div class="ql"><div class="qc"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px"><span style="font-size:12px;color:var(--t3)">Câu <b style="color:var(--t)">${S.cur+1}</b>/${S.qs.length}</span><span style="font-size:12px;color:var(--t3)"><b style="color:var(--p)">${Object.keys(S.ans).length}</b> đã chọn</span></div><div class="qpb"><div class="qpf" style="width:${pc}%"></div></div><div class="qnl">CÂU ${S.cur+1}</div><div class="qt">${q.question}</div>${chs}<div class="qnv"><button class="bo" onclick="gt(${S.cur-1})" ${S.cur===0?'disabled':''}>◀ Trước</button><button class="bd2" onclick="csb()">Nộp bài</button>${S.cur<S.qs.length-1?`<button class="bp" onclick="gt(${S.cur+1})">Tiếp ▶</button>`:`<button class="bp" style="background:var(--g)" onclick="subq()">Xong ✓</button>`}</div></div>
  <div class="qs2"><div class="tc2"><div class="ct" style="margin-bottom:9px">Thời gian</div><div class="tr"><svg width="86" height="86" viewBox="0 0 86 86"><circle class="tcb" cx="43" cy="43" r="38"/><circle class="tcc" cx="43" cy="43" r="38" stroke="${w?'#dc2626':'var(--p)'}" stroke-dasharray="${ci}" stroke-dashoffset="${ci-d}" id="tcc"/></svg><div class="tct" id="tct" style="color:${w?'var(--r)':'var(--t)'}">${m}:${s}</div></div>${w?'<div style="font-size:11px;color:var(--r);font-weight:700">⚠ Sắp hết giờ!</div>':''}</div><div class="card"><div class="ct" style="margin-bottom:9px">Câu hỏi</div><div class="dg2">${dots}</div></div></div></div></div>`;
}
function stt(){
  clearInterval(S.ti);const tot=S.nq*90,ci=2*Math.PI*38;
  S.ti=setInterval(()=>{S.tl--;const m=String(Math.floor(S.tl/60)).padStart(2,'0'),s=String(S.tl%60).padStart(2,'0'),w=S.tl<60,d=(S.tl/tot)*ci;
  const tt=$("tct"),tc=$("tcc");if(tt){tt.textContent=`${m}:${s}`;tt.style.color=w?"var(--r)":"var(--t)";}if(tc){tc.style.strokeDashoffset=ci-d;tc.style.stroke=w?"#dc2626":"var(--p)";}if(S.tl<=0){clearInterval(S.ti);subq();}},1000);
}
function pk(l){if(S.cm[S.cur]!==undefined)return;S.ans[S.cur]=l;document.querySelectorAll('.cb2').forEach(e=>{const lb=e.querySelector('.cl').textContent;e.className="cb2"+(lb===l?" sel":"");});const d=document.querySelectorAll('.qd');if(d[S.cur]){d[S.cur].classList.remove("cur");d[S.cur].classList.add("ans");}if(S.an&&S.cur<S.qs.length-1)setTimeout(()=>gt(S.cur+1),500);}
function gt(i){if(i<0||i>=S.qs.length)return;S.cur=i;rp2();stt();}
function csb(){const l=S.qs.length-Object.keys(S.ans).length;if(l>0&&!confirm(`Còn ${l} câu chưa trả lời. Nộp bài?`))return;subq();}
async function subq(){
  clearInterval(S.ti);const tk=Math.round((Date.now()-S.st)/1000);
  try{const r=await fetch(`${API}/quiz/submit`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:S.sid,answers:S.ans,time_taken:tk})});const d=await r.json();d.details.forEach(det=>S.cm[det.id]=det.correct);S.res=d;S.pg="result";rp2();lst();}
  catch{tst("Lỗi nộp bài!","err");}
}
function rrs(){
  const r=S.res,p=r.percent,em=p>=90?'🏆':p>=70?'🥈':p>=50?'📖':'💪',msg=p>=90?'Xuất sắc! Tuyệt vời!':p>=70?'Rất tốt!':p>=50?'Cố gắng lên!':'Cần ôn thêm!';
  const dts=r.details.map(d=>{const cc=(d.choices||[]).find(c=>c.label===d.correct);return`<div class="di ${d.ok?'ok':'bad'}"><div class="diq"><span class="tag ${d.ok?'ok':'bad'}">${d.ok?'✓':'✗'}</span><span>${d.question}</span></div>${!d.ok?`<div class="dia">Bạn: <b style="color:var(--r)">${d.user||'—'}</b> · Đúng: <b style="color:var(--g)">${d.correct}</b>${cc?` — ${cc.text}`:''}</div>`:''}</div>`;}).join('');
  return`<div class="page"><div class="rh"><div style="font-size:44px;margin-bottom:9px">${em}</div><div class="rp">${p}%</div><div class="rm">${msg}</div><div class="rss"><div class="rs"><div class="rsn">${r.score}</div><div class="rsl">Đúng</div></div><div class="rs"><div class="rsn">${r.total-r.score}</div><div class="rsl">Sai</div></div><div class="rs"><div class="rsn">${r.total}</div><div class="rsl">Tổng</div></div></div><div style="display:flex;gap:9px;justify-content:center;margin-top:20px"><button class="upi" onclick="rstq()">🔄 Thi lại</button><button class="upi" onclick="rw()" ${r.score===r.total?'disabled style="opacity:.5"':''}>📝 Ôn câu sai</button></div></div><div style="font-size:11px;font-weight:700;color:var(--t3);letter-spacing:.07em;margin-bottom:11px">CHI TIẾT TỪNG CÂU</div>${dts}</div>`;
}
function rstq(){S.pg="quiz-start";nv("quiz-start");}
function rw(){const w=S.res.details.filter(d=>!d.ok).length;if(!w)return;S.nq=Math.min(w,20);sq();}

function rht(){
  if(!S.hist.length)return`<div class="page"><div class="tb"><div class="pt">Lịch sử</div></div><div class="card" style="text-align:center;padding:44px;color:var(--t3)">📭 Chưa có lịch sử</div></div>`;
  const avg=Math.round(S.hist.reduce((a,h)=>a+h.percent,0)/S.hist.length),best=Math.max(...S.hist.map(h=>h.percent));
  const rows=S.hist.map((h,i)=>{const c=h.percent>=80?"var(--g)":h.percent>=60?"var(--a)":"var(--r)",bc=h.percent>=80?"#10b981":h.percent>=60?"#f59e0b":"#ef4444";return`<tr style="animation:fu .28s ease ${i*.04}s both"><td><b>${S.hist.length-i}</b></td><td style="font-family:Outfit;font-size:17px;font-weight:800;color:${c}">${h.percent}%</td><td><b>${h.score}</b><span style="color:var(--t3)">/${h.total}</span><div class="pb"><div class="pbf" style="width:${h.percent}%;background:${bc}"></div></div></td><td style="color:var(--t3);font-size:12px">${h.date}</td><td style="font-size:12px">${h.time_taken?`${Math.floor(h.time_taken/60)}p${h.time_taken%60}s`:'–'}</td></tr>`;}).join('');
  return`<div class="page"><div class="tb"><div><div class="pt">Lịch sử</div><div class="ps">${S.hist.length} lần thi</div></div><button class="bd2" style="padding:7px 14px;font-size:12px" onclick="clh()">🗑 Xóa</button></div><div class="sr stg"><div class="sc"><div class="sic ip">📊</div><div><div class="sn" style="color:var(--p)">${S.hist.length}</div><div class="sl">Lần thi</div></div></div><div class="sc"><div class="sic ig">💯</div><div><div class="sn" style="color:var(--g)">${avg}%</div><div class="sl">Trung bình</div></div></div><div class="sc"><div class="sic ia">🏆</div><div><div class="sn" style="color:var(--a)">${best}%</div><div class="sl">Cao nhất</div></div></div></div><div class="card"><table class="ht"><thead><tr><th>#</th><th>Điểm</th><th>Kết quả</th><th>Ngày</th><th>Thời gian</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
}
function afh(){setTimeout(()=>document.querySelectorAll('.pbf').forEach(e=>{const w=e.style.width;e.style.width='0';requestAnimationFrame(()=>e.style.width=w);}),200);}
async function clh(){if(!confirm("Xóa toàn bộ lịch sử?"))return;await fetch(`${API}/history/clear`,{method:'DELETE'});S.hist=[];tst("Đã xóa lịch sử");rp2();}

function rup(){return`<div class="page"><div class="tb"><div><div class="pt">Tệp đã tải</div><div class="ps">Quản lý ngân hàng câu hỏi</div></div><button class="bd2" style="padding:7px 14px;font-size:12px" onclick="clq()">🗑 Xóa câu hỏi</button></div><div class="sr" style="grid-template-columns:1fr 1fr;margin-bottom:16px"><div class="sc"><div class="sic ip">📚</div><div><div class="sn" style="color:var(--p)">${S.stats.total_questions}</div><div class="sl">Câu hỏi</div></div></div><div class="sc"><div class="sic ig">✅</div><div><div class="sn" style="color:var(--g)">${S.stats.with_answer}</div><div class="sl">Có đáp án</div></div></div></div><div class="card" style="margin-bottom:14px"><div class="dz" id="dz" onclick="$('fi').click()"><div style="font-size:42px;margin-bottom:10px;animation:fl 3s ease-in-out infinite">📂</div><div style="font-size:15px;font-weight:700;margin-bottom:5px">Kéo thả file vào đây</div><div style="font-size:13px;color:var(--t3)">Hỗ trợ Word (.docx) và PDF</div><input type="file" id="fi" accept=".docx,.pdf" multiple onchange="hf(this.files)"><button class="bp" style="margin-top:14px" onclick="event.stopPropagation();$('fi').click()">Chọn file</button></div><div id="flist" style="margin-top:9px"></div><div id="ures" style="display:none;margin-top:9px;padding:13px 17px;border-radius:11px;font-size:14px;font-weight:600"></div></div><div class="card"><div class="ch2"><div class="ct">ĐỊNH DẠNG HỖ TRỢ</div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:11px"><div style="background:var(--bg);border-radius:11px;padding:14px"><div style="font-weight:700;margin-bottom:7px">📄 Word (.docx)</div><ul style="font-size:12px;color:var(--t2);line-height:2;list-style:none"><li>✓ Câu hỏi đánh số 1. 2. 3...</li><li>✓ Đáp án A. B. C. D.</li><li>✓ Bảng đáp án cuối trang</li></ul></div><div style="background:var(--bg);border-radius:11px;padding:14px"><div style="font-weight:700;margin-bottom:7px">📋 PDF</div><ul style="font-size:12px;color:var(--t2);line-height:2;list-style:none"><li>✓ PDF có text chọn được</li><li>✓ Đáp án đúng tô màu đỏ</li><li>✗ PDF scan chưa hỗ trợ</li></ul></div></div></div></div>`;}
function bd(){const dz=$("dz");if(!dz)return;dz.addEventListener("dragover",e=>{e.preventDefault();dz.classList.add("drag");});dz.addEventListener("dragleave",()=>dz.classList.remove("drag"));dz.addEventListener("drop",e=>{e.preventDefault();dz.classList.remove("drag");hf(e.dataTransfer.files);});}
async function hf(files){
  if(!files?.length)return;const fl=$("flist"),ur=$("ures");fl.innerHTML='';ur.style.display='none';let a=0,p=0;
  for(const f of files){const it=document.createElement("div");it.className="fitem";it.innerHTML=`<span style="font-size:20px">${f.name.endsWith('.pdf')?'📋':'📄'}</span><div><div style="font-size:13px;font-weight:600;flex:1">${f.name}</div><div style="font-size:11px;color:var(--t3)">Đang xử lý...</div></div><span class="fib" style="background:#fef3c7;color:#92400e">⏳</span>`;fl.appendChild(it);
  const fd=new FormData();fd.append("file",f);
  try{const r=await fetch(`${API}/upload`,{method:'POST',body:fd});const d=await r.json();if(r.ok){a+=d.added;p+=d.parsed;it.querySelectorAll('div')[1].querySelector('div:last-child').textContent=`${d.parsed} câu · +${d.added} mới`;it.querySelector('.fib').style.cssText='background:#d1fae5;color:#065f46';it.querySelector('.fib').textContent='✓';}else{it.querySelectorAll('div')[1].querySelector('div:last-child').textContent=d.detail;it.querySelector('.fib').textContent='✗';}}catch{it.querySelectorAll('div')[1].querySelector('div:last-child').textContent="Lỗi kết nối";}}
  ur.style.display='block';ur.style.cssText='display:block;margin-top:9px;padding:13px 17px;border-radius:11px;font-size:14px;font-weight:600;background:#d1fae5;border:1px solid #a7f3d0;color:#065f46';
  ur.textContent=`✅ Xong! ${p} câu nhận dạng · +${a} câu mới`;tst(`Thêm ${a} câu hỏi!`);await lst();
}
async function clq(){if(!confirm("Xóa toàn bộ câu hỏi?"))return;await fetch(`${API}/questions/clear`,{method:'DELETE'});await lst();tst("Đã xóa câu hỏi");rp2();}

function rset(){return`<div class="page"><div class="tb"><div class="pt">Cài đặt</div></div><div class="card" style="max-width:520px"><div class="ct" style="margin-bottom:3px">TÀI KHOẢN</div><div class="sr2"><div><div class="sl3">Tên hiển thị</div><div class="sd3">${S.user?.name||'—'}</div></div><button class="bo" style="padding:7px 13px;font-size:12px" onclick="om('pm')">Đổi tên</button></div><div class="sr2"><div><div class="sl3">Email</div><div class="sd3">${S.user?.email||'—'}</div></div></div><div class="ct" style="margin:18px 0 3px">TRẢI NGHIỆM</div><div class="sr2"><div><div class="sl3">Tự động sang câu tiếp</div><div class="sd3">Chuyển câu sau khi chọn</div></div><div class="tgg ${S.an?'on':''}" id="tg-an" onclick="tgs('an')"></div></div><div class="ct" style="margin:18px 0 3px">DỮ LIỆU</div><div class="sr2"><div><div class="sl3">Xóa lịch sử</div><div class="sd3">${S.hist.length} bản ghi</div></div><button class="bd2" style="padding:7px 13px;font-size:12px" onclick="clh()">Xóa</button></div><div class="sr2"><div><div class="sl3">Xóa câu hỏi</div><div class="sd3">${S.stats.total_questions} câu hỏi</div></div><button class="bd2" style="padding:7px 13px;font-size:12px" onclick="clq()">Xóa</button></div><div class="sr2"><div><div class="sl3">Đăng xuất</div><div class="sd3">Thoát khỏi tài khoản</div></div><button class="bd2" style="padding:7px 13px;font-size:12px" onclick="lo()">Đăng xuất</button></div></div></div>`;}
function tgs(k){if(k==='an'){S.an=!S.an;localStorage.setItem("cq_an",S.an);$("tg-an")?.classList.toggle("on",S.an);}}

// Init
(()=>{const u=localStorage.getItem("cq_u");if(u){try{S.user=JSON.parse(u);$("aw").style.display="none";$("app").classList.add("on");lst().then(()=>lh().then(()=>rp2()));uui();}catch{localStorage.removeItem("cq_u");}}})();
</script>
</body>
