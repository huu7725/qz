<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuizMaster</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4f6fb;
  --white: #ffffff;
  --sidebar-bg: #ffffff;
  --sidebar-w: 230px;
  --primary: #4f46e5;
  --primary-light: #eef2ff;
  --primary-dark: #3730a3;
  --secondary: #f59e0b;
  --green: #10b981;
  --red: #ef4444;
  --text: #1e1b4b;
  --text2: #64748b;
  --text3: #94a3b8;
  --border: #e8edf5;
  --shadow: 0 2px 16px rgba(79,70,229,0.07);
  --shadow-lg: 0 8px 32px rgba(79,70,229,0.13);
  --radius: 16px;
  --radius-sm: 10px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;display:flex}

/* ── SIDEBAR ── */
.sidebar{width:var(--sidebar-w);min-height:100vh;background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:24px 16px;position:fixed;left:0;top:0;bottom:0;z-index:50;transition:transform .3s}
.logo{display:flex;align-items:center;gap:10px;padding:0 8px;margin-bottom:32px}
.logo-icon{width:40px;height:40px;background:var(--primary);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;box-shadow:0 4px 12px rgba(79,70,229,0.35)}
.logo-text{font-family:'Outfit',sans-serif;font-size:18px;font-weight:800;color:var(--primary)}
.nav-section{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.1em;padding:0 12px;margin:16px 0 8px}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;cursor:pointer;transition:all .18s;color:var(--text2);font-size:14px;font-weight:500;margin-bottom:2px;position:relative}
.nav-item:hover{background:var(--primary-light);color:var(--primary)}
.nav-item.active{background:var(--primary);color:#fff;box-shadow:0 4px 14px rgba(79,70,229,0.35)}
.nav-item.active .nav-icon{filter:brightness(10)}
.nav-icon{font-size:18px;width:20px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--secondary);color:#fff;border-radius:99px;font-size:10px;font-weight:700;padding:2px 7px}
.sidebar-bottom{margin-top:auto;padding-top:16px;border-top:1px solid var(--border)}
.user-mini{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;transition:all .18s}
.user-mini:hover{background:var(--primary-light)}
.user-avatar{width:34px;height:34px;border-radius:99px;background:linear-gradient(135deg,var(--primary),#818cf8);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;flex-shrink:0}
.user-name{font-size:13px;font-weight:600}
.user-role{font-size:11px;color:var(--text3)}

/* ── MAIN ── */
.main{margin-left:var(--sidebar-w);flex:1;height:100vh;overflow-y:auto;padding:28px 28px 60px;scroll-behavior:smooth}
.main::-webkit-scrollbar{width:5px}
.main::-webkit-scrollbar-thumb{background:#e2e8f0;border-radius:99px}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.greeting{font-family:'Outfit',sans-serif;font-size:26px;font-weight:800;color:var(--text)}
.greeting span{color:var(--primary)}
.topbar-right{display:flex;align-items:center;gap:12px}
.icon-btn{width:38px;height:38px;border-radius:10px;border:1px solid var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:17px;transition:all .18s}
.icon-btn:hover{border-color:var(--primary);color:var(--primary)}

/* ── GRID ── */
.dashboard-grid{display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:auto;gap:18px}
.col-span-2{grid-column:span 2}
.col-span-3{grid-column:span 3}

/* ── CARDS ── */
.card{background:var(--white);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow);transition:all .25s;position:relative;overflow:hidden}
.card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.card-title{font-size:14px;font-weight:700;color:var(--text)}
.card-sub{font-size:12px;color:var(--text3)}
.card-badge{padding:4px 12px;border-radius:99px;font-size:11px;font-weight:700}
.badge-green{background:#d1fae5;color:#065f46}
.badge-amber{background:#fef3c7;color:#92400e}
.badge-blue{background:var(--primary-light);color:var(--primary)}

/* ── STAT CARDS ── */
.stat-card{background:var(--white);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);display:flex;align-items:center;gap:16px;transition:all .25s;cursor:pointer}
.stat-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.stat-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.stat-icon.blue{background:#eef2ff}
.stat-icon.green{background:#d1fae5}
.stat-icon.amber{background:#fef3c7}
.stat-icon.red{background:#fee2e2}
.stat-n{font-family:'Outfit',sans-serif;font-size:26px;font-weight:800;line-height:1}
.stat-l{font-size:12px;color:var(--text2);margin-top:3px}
.stat-trend{font-size:11px;font-weight:600;margin-top:4px}
.trend-up{color:var(--green)}
.trend-dn{color:var(--red)}

/* ── CHART BAR ── */
.chart-wrap{position:relative;height:160px;display:flex;align-items:flex-end;gap:8px;padding:0 4px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar{width:100%;border-radius:8px 8px 0 0;background:linear-gradient(180deg,#818cf8,var(--primary));min-height:4px;transition:height .8s cubic-bezier(.34,1.56,.64,1);position:relative;cursor:pointer}
.bar:hover{filter:brightness(1.15)}
.bar-tooltip{position:absolute;top:-32px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:700;white-space:nowrap;opacity:0;transition:opacity .15s;pointer-events:none}
.bar:hover .bar-tooltip{opacity:1}
.bar-label{font-size:10px;color:var(--text3);font-weight:600}
.bar-val{font-size:10px;color:var(--primary);font-weight:700}
.chart-grid{position:absolute;top:0;left:0;right:0;bottom:24px;pointer-events:none}
.chart-line{position:absolute;left:0;right:0;border-top:1px dashed #f1f5f9;font-size:9px;color:var(--text3)}

/* ── DONUT ── */
.donut-wrap{display:flex;align-items:center;gap:24px}
.donut-svg{flex-shrink:0}
.donut-legend{display:flex;flex-direction:column;gap:8px}
.legend-item{display:flex;align-items:center;gap:8px;font-size:13px}
.legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}

/* ── SCORE BIG ── */
.score-big{text-align:center;padding:8px 0}
.score-fraction{font-family:'Outfit',sans-serif;font-size:42px;font-weight:800;line-height:1}
.score-top{color:var(--primary)}
.score-div{width:60px;height:3px;background:linear-gradient(90deg,var(--primary),var(--secondary));border-radius:99px;margin:8px auto}
.score-bot{color:var(--secondary)}
.score-label{font-size:13px;color:var(--text2);font-weight:600;margin-top:6px}

/* ── UPLOAD CARD ── */
.upload-card{background:linear-gradient(135deg,#4f46e5,#7c3aed);border-radius:var(--radius);padding:22px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:160px;gap:10px}
.upload-card::before{content:'';position:absolute;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,0.07);top:-80px;right:-60px}
.upload-card::after{content:'';position:absolute;width:150px;height:150px;border-radius:50%;background:rgba(255,255,255,0.05);bottom:-60px;left:-40px}
.upload-card:hover{transform:translateY(-3px);box-shadow:0 12px 36px rgba(79,70,229,0.4)}
.upload-icon-big{font-size:40px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.upload-btn-pill{background:#fff;color:var(--primary);border-radius:99px;padding:8px 22px;font-size:13px;font-weight:700;position:relative;z-index:1;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .18s}
.upload-btn-pill:hover{background:var(--primary-light)}
.upload-title-w{color:#fff;font-size:15px;font-weight:700;position:relative;z-index:1}
.upload-sub-w{color:rgba(255,255,255,.7);font-size:12px;position:relative;z-index:1}
#file-input{display:none}

/* ── EXAM LIST ── */
.exam-item{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid var(--border)}
.exam-item:last-child{border-bottom:none;padding-bottom:0}
.exam-dot{width:10px;height:10px;border-radius:50%;border:2px solid var(--primary);flex-shrink:0}
.exam-dot.done{background:var(--primary);border-color:var(--primary)}
.exam-info{flex:1}
.exam-name{font-size:14px;font-weight:600}
.exam-date{font-size:12px;color:var(--text3);margin-top:2px}
.exam-time{font-size:12px;font-weight:700;color:var(--secondary);background:#fef3c7;padding:2px 10px;border-radius:99px}

/* ── HISTORY PAGE ── */
.hist-table{width:100%;border-collapse:collapse}
.hist-table th{font-size:11px;font-weight:700;color:var(--text3);text-align:left;padding:8px 12px;letter-spacing:.05em}
.hist-table td{padding:12px;border-top:1px solid var(--border);font-size:14px}
.hist-table tr{transition:background .15s}
.hist-table tr:hover td{background:var(--primary-light)}
.pct-bar{height:6px;background:#f1f5f9;border-radius:99px;overflow:hidden;margin-top:4px}
.pct-fill{height:6px;border-radius:99px;transition:width 1s ease}

/* ── QUIZ SCREEN ── */
.quiz-layout{display:grid;grid-template-columns:1fr 280px;gap:18px;align-items:start}
.q-card{background:var(--white);border-radius:var(--radius);padding:28px;box-shadow:var(--shadow)}
.q-progress-bar{height:5px;background:#f1f5f9;border-radius:99px;margin-bottom:24px;overflow:hidden}
.q-progress-fill{height:5px;background:linear-gradient(90deg,var(--primary),#818cf8);border-radius:99px;transition:width .5s ease}
.q-num-label{font-size:11px;font-weight:700;color:var(--primary);letter-spacing:.1em;margin-bottom:10px}
.q-text{font-size:17px;font-weight:600;line-height:1.75;color:var(--text);margin-bottom:24px}
.choice{display:flex;align-items:center;gap:14px;padding:13px 16px;margin-bottom:10px;border-radius:12px;border:2px solid var(--border);cursor:pointer;transition:all .18s;font-size:14px;font-weight:500;color:var(--text)}
.choice:hover{border-color:var(--primary);background:var(--primary-light);color:var(--primary)}
.choice.sel{border-color:var(--primary);background:var(--primary-light);color:var(--primary)}
.choice.correct{border-color:var(--green);background:#d1fae5;color:#065f46}
.choice.wrong{border-color:var(--red);background:#fee2e2;color:#991b1b}
.c-lbl{width:30px;height:30px;border-radius:8px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0;transition:all .18s}
.choice.sel .c-lbl{background:var(--primary);color:#fff}
.choice.correct .c-lbl{background:var(--green);color:#fff}
.choice.wrong .c-lbl{background:var(--red);color:#fff}
.choice:hover .c-lbl{background:var(--primary);color:#fff}
.q-nav{display:flex;gap:10px;margin-top:24px;justify-content:space-between}
.btn-primary{padding:11px 24px;border-radius:10px;border:none;background:var(--primary);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .18s}
.btn-primary:hover{background:var(--primary-dark);transform:translateY(-1px)}
.btn-outline{padding:11px 24px;border-radius:10px;border:2px solid var(--border);background:transparent;color:var(--text2);font-size:14px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .18s}
.btn-outline:hover{border-color:var(--primary);color:var(--primary)}
.btn-outline[disabled]{opacity:.35;cursor:not-allowed}
.btn-danger{padding:11px 24px;border-radius:10px;border:2px solid #fecaca;background:#fee2e2;color:var(--red);font-size:14px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .18s}
.btn-danger:hover{background:#fecaca}

/* QUIZ SIDEBAR */
.quiz-side{display:flex;flex-direction:column;gap:14px}
.quiz-timer-card{background:var(--white);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);text-align:center}
.timer-ring{position:relative;width:90px;height:90px;margin:0 auto 12px}
.timer-ring svg{transform:rotate(-90deg)}
.timer-circle-bg{fill:none;stroke:#f1f5f9;stroke-width:6}
.timer-circle{fill:none;stroke:var(--primary);stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset .5s,stroke .3s}
.timer-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Outfit',sans-serif;font-size:18px;font-weight:800;color:var(--text)}
.dot-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.qdot{height:30px;border-radius:7px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;color:var(--text3)}
.qdot:hover{background:var(--primary-light);color:var(--primary)}
.qdot.ans{background:var(--primary-light);color:var(--primary);border:1.5px solid var(--primary)}
.qdot.cur{background:var(--primary);color:#fff}

/* RESULT */
.result-hero{background:linear-gradient(135deg,var(--primary),#7c3aed);border-radius:var(--radius);padding:32px;text-align:center;color:#fff;margin-bottom:18px;position:relative;overflow:hidden}
.result-hero::before{content:'🎉';position:absolute;font-size:80px;opacity:.08;top:-10px;right:20px}
.result-pct{font-family:'Outfit',sans-serif;font-size:64px;font-weight:800;line-height:1;margin-bottom:4px}
.result-msg{font-size:16px;opacity:.9;margin-bottom:20px}
.result-stats-row{display:flex;justify-content:center;gap:32px}
.rs{text-align:center}
.rs-n{font-family:'Outfit',sans-serif;font-size:28px;font-weight:800}
.rs-l{font-size:12px;opacity:.75;margin-top:2px}
.detail-list{display:flex;flex-direction:column;gap:10px}
.detail-item{background:var(--white);border-radius:12px;padding:16px 18px;box-shadow:var(--shadow);border-left:4px solid}
.detail-item.ok{border-color:var(--green)}
.detail-item.bad{border-color:var(--red)}
.detail-q{font-size:14px;font-weight:500;line-height:1.6;margin-bottom:6px;display:flex;gap:10px}
.tag{padding:2px 10px;border-radius:99px;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px}
.tag.ok{background:#d1fae5;color:#065f46}
.tag.bad{background:#fee2e2;color:#991b1b}
.detail-ans{font-size:12px;color:var(--text2)}

/* UPLOAD PAGE */
.upload-drop{border:2px dashed #c7d2fe;border-radius:var(--radius);padding:48px 24px;text-align:center;cursor:pointer;transition:all .2s;background:#fafbff}
.upload-drop:hover,.upload-drop.drag{border-color:var(--primary);background:var(--primary-light)}
.upload-drop.drag{transform:scale(1.01)}
.file-list{display:flex;flex-direction:column;gap:8px;margin-top:16px}
.file-item{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--white);border-radius:10px;border:1px solid var(--border);box-shadow:var(--shadow)}
.file-icon{font-size:22px}
.file-name{font-size:14px;font-weight:600;flex:1}
.file-status{font-size:12px;color:var(--text3)}
.file-badge{padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700}

/* SETTINGS */
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid var(--border)}
.setting-row:last-child{border-bottom:none}
.setting-label{font-size:14px;font-weight:600}
.setting-desc{font-size:12px;color:var(--text3);margin-top:3px}
.toggle{width:42px;height:24px;background:#e2e8f0;border-radius:99px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--primary)}
.toggle::after{content:'';position:absolute;width:18px;height:18px;background:#fff;border-radius:50%;top:3px;left:3px;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.15)}
.toggle.on::after{transform:translateX(18px)}
.input-field{padding:8px 14px;border-radius:8px;border:1.5px solid var(--border);font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;color:var(--text);outline:none;transition:border .18s;width:160px}
.input-field:focus{border-color:var(--primary)}

/* ANIM */
.page{animation:pageIn .3s ease}
@keyframes pageIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.stagger>*{animation:fadeUp .3s ease both}
.stagger>*:nth-child(1){animation-delay:.05s}
.stagger>*:nth-child(2){animation-delay:.1s}
.stagger>*:nth-child(3){animation-delay:.15s}
.stagger>*:nth-child(4){animation-delay:.2s}
.stagger>*:nth-child(5){animation-delay:.25s}
.stagger>*:nth-child(6){animation-delay:.3s}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.pulse{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(79,70,229,0.3)}50%{box-shadow:0 0 0 8px rgba(79,70,229,0)}}

/* TOAST */
.toast{position:fixed;bottom:28px;right:28px;background:var(--text);color:#fff;border-radius:12px;padding:12px 22px;font-size:13px;font-weight:600;z-index:999;transform:translateX(120px);transition:transform .3s cubic-bezier(.34,1.56,.64,1);display:flex;align-items:center;gap:8px;box-shadow:var(--shadow-lg)}
.toast.show{transform:translateX(0)}
.toast.ok{background:#065f46;border:1px solid var(--green)}
.toast.err{background:#991b1b;border:1px solid var(--red)}

/* PROFILE MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(30,27,75,.4);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal{background:var(--white);border-radius:20px;padding:32px;width:380px;box-shadow:0 24px 64px rgba(0,0,0,.15);transform:scale(.95) translateY(10px);transition:all .25s}
.modal-overlay.show .modal{transform:scale(1) translateY(0)}
.modal-avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--primary),#818cf8);display:flex;align-items:center;justify-content:center;color:#fff;font-size:32px;font-weight:800;margin:0 auto 16px;box-shadow:0 8px 24px rgba(79,70,229,.3)}
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div class="logo-text">QuizMaster</div>
  </div>

  <div class="nav-section">MENU</div>
  <div class="nav-item active" onclick="navigate('dashboard')" id="nav-dashboard">
    <span class="nav-icon">🏠</span> Trang chủ
  </div>
  <div class="nav-item" onclick="navigate('quiz-start')" id="nav-quiz-start">
    <span class="nav-icon">▶️</span> Làm bài
  </div>
  <div class="nav-item" onclick="navigate('history')" id="nav-history">
    <span class="nav-icon">🕐</span> Lịch sử
  </div>
  <div class="nav-item" onclick="navigate('upload')" id="nav-upload">
    <span class="nav-icon">📂</span> Tệp đã tải
  </div>

  <div class="nav-section">HỆ THỐNG</div>
  <div class="nav-item" onclick="navigate('settings')" id="nav-settings">
    <span class="nav-icon">⚙️</span> Cài đặt
  </div>

  <div class="sidebar-bottom">
    <div class="user-mini" onclick="openProfile()">
      <div class="user-avatar" id="sidebar-avatar">L</div>
      <div>
        <div class="user-name" id="sidebar-name">Người dùng</div>
        <div class="user-role">Sinh viên</div>
      </div>
    </div>
  </div>
</aside>

<!-- MAIN -->
<main class="main" id="main"></main>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- PROFILE MODAL -->
<div class="modal-overlay" id="profile-modal" onclick="closeProfile(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-avatar" id="modal-avatar">L</div>
    <div style="text-align:center;margin-bottom:24px">
      <div style="font-size:20px;font-weight:800" id="modal-name">Người dùng</div>
      <div style="font-size:13px;color:var(--text3)">Sinh viên</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:14px">
      <div>
        <label style="font-size:12px;font-weight:700;color:var(--text3);display:block;margin-bottom:6px">TÊN HIỂN THỊ</label>
        <input class="input-field" style="width:100%" id="name-input" placeholder="Nhập tên..." oninput="previewName(this.value)">
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn-primary" style="flex:1" onclick="saveName()">Lưu</button>
        <button class="btn-outline" style="flex:1" onclick="closeProfile()">Đóng</button>
      </div>
    </div>
  </div>
</div>

<script>
const API = "http://127.0.0.1:8000";
const ST = {
  page: "dashboard",
  userName: localStorage.getItem("qm_name") || "Bạn ơi",
  numQ: 10,
  stats: {},
  history: [],
  session: null,
  questions: [],
  current: 0,
  answers: {},
  correctMap: {},
  timeLeft: 0,
  timerInterval: null,
  result: null,
  startTime: 0,
  settingSound: localStorage.getItem("qm_sound") !== "false",
  settingAutoNext: localStorage.getItem("qm_autonext") === "true",
};

// ── Utils ──
function $(id){ return document.getElementById(id); }
function toast(msg, type="ok") {
  const el = $("toast");
  el.innerHTML = (type==="ok"?"✅ ":"❌ ") + msg;
  el.className = `toast show ${type}`;
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.classList.remove("show"), 2800);
}
function getHour() {
  const h = new Date().getHours();
  if (h < 12) return "Chào buổi sáng";
  if (h < 18) return "Chào buổi chiều";
  return "Chào buổi tối";
}
function pct(a,b){ return b ? Math.round(a/b*100) : 0; }

// ── Name / Profile ──
function updateNameUI() {
  const n = ST.userName;
  $("sidebar-name").textContent = n;
  $("sidebar-avatar").textContent = n[0]?.toUpperCase()||"U";
  $("modal-avatar").textContent = n[0]?.toUpperCase()||"U";
  $("modal-name").textContent = n;
  if($("name-input")) $("name-input").value = n;
}
function openProfile() {
  $("name-input") && ($("name-input").value = ST.userName);
  $("profile-modal").classList.add("show");
}
function closeProfile(e) {
  if (!e || e.target === $("profile-modal")) $("profile-modal").classList.remove("show");
}
function previewName(v) {
  $("modal-avatar").textContent = v[0]?.toUpperCase()||"U";
  $("modal-name").textContent = v || "Người dùng";
}
function saveName() {
  const v = $("name-input").value.trim();
  if (!v) return;
  ST.userName = v;
  localStorage.setItem("qm_name", v);
  updateNameUI();
  closeProfile();
  toast("Đã lưu tên!");
  if (ST.page === "dashboard") renderPage();
}

// ── Navigation ──
function navigate(page) {
  ST.page = page;
  document.querySelectorAll(".nav-item").forEach(el => el.classList.remove("active"));
  const navEl = $(`nav-${page}`);
  if (navEl) navEl.classList.add("active");
  if (page === "history") loadHistory().then(renderPage);
  else if (page === "dashboard") loadStats().then(renderPage);
  else renderPage();
  $("main").scrollTo({top:0, behavior:"smooth"});
}

// ── API ──
async function loadStats() {
  try {
    const r = await fetch(`${API}/stats`);
    ST.stats = await r.json();
  } catch(e) { ST.stats = { total_questions:0, with_answer:0, total_sessions:0, avg_score:0, best_score:0 }; }
}
async function loadHistory() {
  try {
    const r = await fetch(`${API}/history`);
    ST.history = (await r.json()).reverse();
  } catch(e) { ST.history = []; }
}

// ── RENDER ──
function renderPage() {
  const main = $("main");
  switch(ST.page) {
    case "dashboard":    main.innerHTML = renderDashboard(); afterDashboard(); break;
    case "quiz-start":   main.innerHTML = renderQuizStart(); break;
    case "quiz":         main.innerHTML = renderQuiz(); break;
    case "result":       main.innerHTML = renderResult(); break;
    case "history":      main.innerHTML = renderHistory(); afterHistory(); break;
    case "upload":       main.innerHTML = renderUpload(); bindUpload(); break;
    case "settings":     main.innerHTML = renderSettings(); break;
  }
  updateNameUI();
}

// ────────────────────────────────────────
//  DASHBOARD
// ────────────────────────────────────────
function renderDashboard() {
  const s = ST.stats;
  const noQ = s.total_questions === 0;
  const hist7 = ST.history.slice(0, 7).reverse();

  // Tạo dữ liệu chart 7 ngày
  const days = ["T2","T3","T4","T5","T6","T7","CN"];
  const chartData = days.map((d,i) => ({
    label: d,
    value: hist7[i]?.score || 0,
    max: hist7[i]?.total || 10
  }));
  const maxVal = Math.max(...chartData.map(d=>d.value), 1);

  const bars = chartData.map(d => {
    const h = Math.round((d.value / maxVal) * 130);
    return `<div class="bar-col">
      <div class="bar" style="height:${h}px" data-val="${d.value}">
        <div class="bar-tooltip">${d.value} đúng</div>
      </div>
      <div class="bar-label">${d.label}</div>
    </div>`;
  }).join('');

  const correctTotal = ST.history.reduce((a,h)=>a+h.score,0);
  const totalTotal   = ST.history.reduce((a,h)=>a+h.total,0);
  const accuracy = pct(correctTotal, totalTotal);
  const donutR = 44, circ = 2*Math.PI*donutR;
  const dash = (accuracy/100)*circ;

  return `<div class="page">
  <div class="topbar">
    <div>
      <div style="font-size:13px;color:var(--text3);margin-bottom:3px">${getHour()},</div>
      <div class="greeting"><span>${ST.userName}</span> 👋</div>
    </div>
    <div class="topbar-right">
      <div class="icon-btn" onclick="navigate('upload')" title="Upload">📂</div>
      <div class="icon-btn" onclick="openProfile()" title="Hồ sơ">👤</div>
    </div>
  </div>

  <div class="dashboard-grid stagger">

    <!-- Stat cards -->
    <div class="stat-card" onclick="navigate('quiz-start')">
      <div class="stat-icon blue">📚</div>
      <div>
        <div class="stat-n" style="color:var(--primary)">${s.total_questions}</div>
        <div class="stat-l">Câu hỏi</div>
        <div class="stat-trend trend-up">▲ Ngân hàng đề</div>
      </div>
    </div>
    <div class="stat-card" onclick="navigate('history')">
      <div class="stat-icon green">✅</div>
      <div>
        <div class="stat-n" style="color:var(--green)">${s.total_sessions}</div>
        <div class="stat-l">Lần thi</div>
        <div class="stat-trend trend-up">${s.avg_score}% trung bình</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-icon amber">🏆</div>
      <div>
        <div class="stat-n" style="color:var(--secondary)">${s.best_score}%</div>
        <div class="stat-l">Điểm cao nhất</div>
        <div class="stat-trend ${s.best_score>=80?'trend-up':'trend-dn'}">${s.best_score>=80?'Xuất sắc!':'Cần cố gắng'}</div>
      </div>
    </div>

    <!-- Bar chart -->
    <div class="card col-span-2">
      <div class="card-head">
        <div>
          <div class="card-title">Điểm 7 ngày gần nhất</div>
          <div class="card-sub">Số câu đúng mỗi buổi thi</div>
        </div>
        <span class="card-badge badge-blue">${ST.history.length} lần thi</span>
      </div>
      <div class="chart-wrap" id="bar-chart">${bars}</div>
    </div>

    <!-- Upload card -->
    <div class="upload-card ${noQ?'pulse':''}" onclick="navigate('upload')">
      <div class="upload-icon-big">☁️</div>
      <div class="upload-title-w">${noQ?'Upload đề thi':'Thêm đề mới'}</div>
      <div class="upload-sub-w">Kéo thả Word / PDF</div>
      <button class="upload-btn-pill">Duyệt qua</button>
    </div>

    <!-- Score big -->
    <div class="card" style="display:flex;align-items:center;justify-content:center">
      <div class="score-big">
        <div class="score-fraction">
          <span class="score-top">${correctTotal}</span>
        </div>
        <div class="score-div"></div>
        <div class="score-fraction">
          <span class="score-bot">${totalTotal}</span>
        </div>
        <div class="score-label">Tổng câu đúng</div>
      </div>
    </div>

    <!-- Donut -->
    <div class="card">
      <div class="card-head">
        <div class="card-title">Độ chính xác</div>
      </div>
      <div class="donut-wrap">
        <svg class="donut-svg" width="110" height="110" viewBox="0 0 110 110">
          <circle class="timer-circle-bg" cx="55" cy="55" r="${donutR}" stroke-width="12"/>
          <circle cx="55" cy="55" r="${donutR}" fill="none" stroke="#fbbf24" stroke-width="12"
            stroke-dasharray="${(1-accuracy/100)*circ} ${circ}"
            stroke-dashoffset="${-dash}" stroke-linecap="round"
            transform="rotate(-90 55 55)"/>
          <circle cx="55" cy="55" r="${donutR}" fill="none" stroke="var(--primary)" stroke-width="12"
            stroke-dasharray="${dash} ${circ}" stroke-linecap="round"
            transform="rotate(-90 55 55)"/>
          <text x="55" y="51" text-anchor="middle" font-size="16" font-weight="800" fill="var(--text)" font-family="Outfit">${accuracy}%</text>
          <text x="55" y="65" text-anchor="middle" font-size="9" fill="#94a3b8">chính xác</text>
        </svg>
        <div class="donut-legend">
          <div class="legend-item"><div class="legend-dot" style="background:var(--primary)"></div><span style="font-size:13px;font-weight:600">${accuracy}% Đúng</span></div>
          <div class="legend-item"><div class="legend-dot" style="background:var(--secondary)"></div><span style="font-size:13px;color:var(--text2)">${100-accuracy}% Sai</span></div>
          <div style="margin-top:8px;font-size:12px;color:var(--text3)">${correctTotal} / ${totalTotal} câu</div>
        </div>
      </div>
    </div>

    <!-- Quick start -->
    <div class="card">
      <div class="card-head">
        <div class="card-title">Bắt đầu nhanh</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px">
        ${[5,10,20].map(n=>`<button class="btn-outline" style="width:100%;justify-content:flex-start;text-align:left" onclick="quickStart(${n})">${n} câu · ${n*1.5} phút</button>`).join('')}
        <button class="btn-primary" style="width:100%" onclick="navigate('quiz-start')">Tuỳ chọn →</button>
      </div>
    </div>

    <!-- Recent history -->
    <div class="card col-span-2">
      <div class="card-head">
        <div class="card-title">Lịch sử gần đây</div>
        <button class="btn-outline" style="padding:6px 14px;font-size:12px" onclick="navigate('history')">Xem tất cả</button>
      </div>
      ${ST.history.length === 0 ? '<div style="text-align:center;padding:24px;color:var(--text3);font-size:14px">Chưa có lịch sử</div>' :
        ST.history.slice(0,4).map(h => {
          const color = h.percent>=80?'var(--green)':h.percent>=60?'var(--secondary)':'var(--red)';
          return `<div style="display:flex;align-items:center;gap:14px;padding:10px 0;border-bottom:1px solid var(--border)">
            <div style="font-family:Outfit;font-size:20px;font-weight:800;color:${color};min-width:48px">${h.percent}%</div>
            <div style="flex:1">
              <div style="font-size:13px;font-weight:600">${h.score}/${h.total} câu đúng</div>
              <div style="font-size:11px;color:var(--text3)">${h.date}</div>
            </div>
            <span class="card-badge ${h.percent>=80?'badge-green':h.percent>=60?'badge-amber':'badge-blue'}">${h.percent>=80?'Tốt':h.percent>=60?'Khá':'Ôn thêm'}</span>
          </div>`;
        }).join('')
      }
    </div>

  </div>
</div>`;
}

function afterDashboard() {
  // Animate bars on load
  setTimeout(() => {
    document.querySelectorAll('.bar').forEach(bar => {
      const h = bar.style.height;
      bar.style.height = '0px';
      requestAnimationFrame(() => { bar.style.height = h; });
    });
  }, 100);
}

// ────────────────────────────────────────
//  QUIZ START
// ────────────────────────────────────────
function renderQuizStart() {
  const s = ST.stats;
  return `<div class="page">
  <div class="topbar">
    <div><div class="greeting">Làm bài</div><div style="font-size:13px;color:var(--text3)">Chọn số câu và bắt đầu</div></div>
  </div>
  <div style="max-width:560px;margin:0 auto">
    <div class="card stagger">
      <div class="card-title" style="margin-bottom:20px">CHỌN SỐ CÂU</div>
      <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:28px">
        ${[5,10,15,20,30].map(n=>`<button class="qdot" style="height:48px;font-size:14px;border-radius:10px;${ST.numQ===n?'background:var(--primary);color:#fff;':''}" onclick="setNum(${n})">${n}</button>`).join('')}
      </div>
      <div style="background:var(--bg);border-radius:12px;padding:16px;margin-bottom:24px;display:flex;gap:24px;justify-content:center">
        <div style="text-align:center"><div style="font-size:22px;font-weight:800;color:var(--primary)">${s.total_questions||0}</div><div style="font-size:12px;color:var(--text3)">Có sẵn</div></div>
        <div style="width:1px;background:var(--border)"></div>
        <div style="text-align:center"><div style="font-size:22px;font-weight:800;color:var(--secondary)">${ST.numQ}</div><div style="font-size:12px;color:var(--text3)">Sẽ thi</div></div>
        <div style="width:1px;background:var(--border)"></div>
        <div style="text-align:center"><div style="font-size:22px;font-weight:800;color:var(--green)">${ST.numQ*90/60} phút</div><div style="font-size:12px;color:var(--text3)">Thời gian</div></div>
      </div>
      <button class="btn-primary" style="width:100%;padding:14px;font-size:16px" onclick="startQuiz()" ${s.total_questions===0?'disabled':''}>
        ${s.total_questions===0?'📂 Cần upload đề thi trước':'🚀 Bắt đầu làm bài'}
      </button>
      ${s.total_questions===0?`<p style="text-align:center;font-size:13px;color:var(--text3);margin-top:10px">Vào <b>Tệp đã tải</b> để upload file Word/PDF</p>`:''}
    </div>
  </div>
</div>`;
}

function setNum(n) { ST.numQ = n; renderPage(); }

async function quickStart(n) {
  ST.numQ = n;
  await startQuiz();
}

async function startQuiz() {
  try {
    const r = await fetch(`${API}/quiz/start?num=${ST.numQ}`);
    if (!r.ok) { toast("Không đủ câu hỏi!", "err"); return; }
    const data = await r.json();
    ST.session = data.session_id;
    ST.questions = data.questions;
    ST.answers = {}; ST.correctMap = {};
    ST.current = 0;
    ST.timeLeft = ST.numQ * 90;
    ST.startTime = Date.now();
    ST.page = "quiz";
    document.querySelectorAll(".nav-item").forEach(el => el.classList.remove("active"));
    renderPage();
    startTimer();
  } catch(e) { toast("Lỗi kết nối server!", "err"); }
}

// ────────────────────────────────────────
//  QUIZ
// ────────────────────────────────────────
function renderQuiz() {
  const q = ST.questions[ST.current];
  if (!q) return '';
  const pctW = ((ST.current+1)/ST.questions.length*100).toFixed(0);
  const m = String(Math.floor(ST.timeLeft/60)).padStart(2,'0');
  const s2 = String(ST.timeLeft%60).padStart(2,'0');
  const warn = ST.timeLeft < 60;
  const total = ST.questions.length;
  const circ = 2*Math.PI*38;
  const timePct = ST.timeLeft / (ST.numQ * 90);
  const dash = timePct * circ;

  const choices = q.choices.map(c => {
    const isSel = ST.answers[ST.current] === c.label;
    const cor = ST.correctMap[ST.current];
    let cls = "choice";
    if (cor) { if (c.label === cor) cls += " correct"; else if (isSel) cls += " wrong"; }
    else if (isSel) cls += " sel";
    return `<div class="${cls}" onclick="pick('${c.label}')" ${cor?'style="cursor:default"':''}>
      <span class="c-lbl">${c.label}</span><span>${c.text}</span>
    </div>`;
  }).join('');

  const dots = ST.questions.map((_,i) => {
    let c = "qdot";
    if (i === ST.current) c += " cur";
    else if (ST.answers[i] !== undefined) c += " ans";
    return `<div class="${c}" onclick="goTo(${i})">${i+1}</div>`;
  }).join('');

  return `<div class="page">
  <div class="quiz-layout">
    <div class="q-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-size:13px;color:var(--text3)">Câu <b style="color:var(--text)">${ST.current+1}</b> / ${total}</span>
        <span style="font-size:13px;color:var(--text3)"><b style="color:var(--primary)">${Object.keys(ST.answers).length}</b> đã trả lời</span>
      </div>
      <div class="q-progress-bar"><div class="q-progress-fill" style="width:${pctW}%"></div></div>
      <div class="q-num-label">CÂU ${ST.current+1}</div>
      <div class="q-text">${q.question}</div>
      ${choices}
      <div class="q-nav">
        <button class="btn-outline" onclick="goTo(${ST.current-1})" ${ST.current===0?'disabled':''}>◀ Trước</button>
        <button class="btn-danger" onclick="confirmSubmit()">Nộp bài</button>
        ${ST.current < total-1
          ? `<button class="btn-primary" onclick="goTo(${ST.current+1})">Tiếp ▶</button>`
          : `<button class="btn-primary" style="background:var(--green)" onclick="submitQuiz()">Xong ✓</button>`}
      </div>
    </div>
    <div class="quiz-side">
      <div class="quiz-timer-card">
        <div class="card-title" style="margin-bottom:12px">Thời gian</div>
        <div class="timer-ring">
          <svg width="90" height="90" viewBox="0 0 90 90">
            <circle class="timer-circle-bg" cx="45" cy="45" r="38"/>
            <circle class="timer-circle" cx="45" cy="45" r="38"
              stroke="${warn?'#ef4444':'var(--primary)'}"
              stroke-dasharray="${circ}"
              stroke-dashoffset="${circ - dash}"
              id="timer-circle"/>
          </svg>
          <div class="timer-text" id="timer-text" style="color:${warn?'var(--red)':'var(--text)'}">${m}:${s2}</div>
        </div>
        ${warn?'<div style="font-size:12px;color:var(--red);font-weight:700;animation:pulse 1s infinite">⚠ Sắp hết giờ!</div>':''}
      </div>
      <div class="card">
        <div class="card-title" style="margin-bottom:12px">Bảng câu hỏi</div>
        <div class="dot-grid">${dots}</div>
      </div>
    </div>
  </div>
</div>`;
}

function startTimer() {
  clearInterval(ST.timerInterval);
  const totalTime = ST.numQ * 90;
  const circ = 2 * Math.PI * 38;
  ST.timerInterval = setInterval(() => {
    ST.timeLeft--;
    const m = String(Math.floor(ST.timeLeft/60)).padStart(2,'0');
    const s = String(ST.timeLeft%60).padStart(2,'0');
    const warn = ST.timeLeft < 60;
    const timePct = ST.timeLeft / totalTime;
    const dash = timePct * circ;
    const tEl = $("timer-text");
    const cEl = $("timer-circle");
    if (tEl) { tEl.textContent = `${m}:${s}`; tEl.style.color = warn ? "var(--red)" : "var(--text)"; }
    if (cEl) { cEl.style.strokeDashoffset = circ - dash; cEl.style.stroke = warn ? "#ef4444" : "var(--primary)"; }
    if (ST.timeLeft <= 0) { clearInterval(ST.timerInterval); submitQuiz(); }
  }, 1000);
}

function pick(label) {
  const cor = ST.correctMap[ST.current];
  if (cor !== undefined) return;
  ST.answers[ST.current] = label;
  // Cập nhật UI không render toàn bộ
  document.querySelectorAll('.choice').forEach(el => {
    const lbl = el.querySelector('.c-lbl').textContent;
    el.className = "choice" + (lbl === label ? " sel" : "");
  });
  // Cập nhật dot
  const dots = document.querySelectorAll('.qdot');
  if (dots[ST.current]) { dots[ST.current].classList.remove("cur"); dots[ST.current].classList.add("ans"); }
  const counter = document.querySelector('.quiz-layout b[style*="primary"]');
  if (counter) counter.textContent = Object.keys(ST.answers).length;
  // Auto-next
  if (ST.settingAutoNext && ST.current < ST.questions.length - 1) {
    setTimeout(() => goTo(ST.current + 1), 600);
  }
}

function goTo(i) {
  if (i < 0 || i >= ST.questions.length) return;
  ST.current = i;
  renderPage();
  startTimer();
}

function confirmSubmit() {
  const left = ST.questions.length - Object.keys(ST.answers).length;
  if (left > 0 && !confirm(`Còn ${left} câu chưa trả lời. Nộp bài?`)) return;
  submitQuiz();
}

async function submitQuiz() {
  clearInterval(ST.timerInterval);
  const timeTaken = Math.round((Date.now() - ST.startTime) / 1000);
  try {
    const r = await fetch(`${API}/quiz/submit`, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ session_id: ST.session, answers: ST.answers, time_taken: timeTaken })
    });
    const data = await r.json();
    data.details.forEach(d => { ST.correctMap[d.id] = d.correct; });
    ST.result = data;
    ST.page = "result";
    renderPage();
    loadStats();
  } catch(e) { toast("Lỗi nộp bài!", "err"); }
}

// ────────────────────────────────────────
//  RESULT
// ────────────────────────────────────────
function renderResult() {
  const r = ST.result;
  const p = r.percent;
  const emoji = p>=90?'🏆':p>=70?'🥈':p>=50?'📖':'💪';
  const msg = p>=90?'Xuất sắc! Bạn thật tuyệt!':p>=70?'Rất tốt, tiếp tục phát huy!':p>=50?'Cố gắng lên nào!':'Cần ôn tập thêm!';

  const details = r.details.map(d => {
    const correctChoice = (d.choices||[]).find(c=>c.label===d.correct);
    return `<div class="detail-item ${d.ok?'ok':'bad'}">
      <div class="detail-q"><span class="tag ${d.ok?'ok':'bad'}">${d.ok?'✓':'✗'}</span><span>${d.question}</span></div>
      ${!d.ok?`<div class="detail-ans">
        Bạn chọn: <b style="color:var(--red)">${d.user||'—'}</b> &nbsp;·&nbsp;
        Đúng: <b style="color:var(--green)">${d.correct}</b>${correctChoice?` — ${correctChoice.text}`:''}
      </div>`:''}
    </div>`;
  }).join('');

  return `<div class="page">
  <div class="result-hero">
    <div style="font-size:48px;margin-bottom:8px">${emoji}</div>
    <div class="result-pct">${p}%</div>
    <div class="result-msg">${msg}</div>
    <div class="result-stats-row">
      <div class="rs"><div class="rs-n">${r.score}</div><div class="rs-l">Câu đúng</div></div>
      <div class="rs"><div class="rs-n">${r.total-r.score}</div><div class="rs-l">Câu sai</div></div>
      <div class="rs"><div class="rs-n">${r.total}</div><div class="rs-l">Tổng câu</div></div>
    </div>
    <div style="display:flex;gap:12px;justify-content:center;margin-top:24px">
      <button class="upload-btn-pill" onclick="restartFromResult()">🔄 Thi lại</button>
      <button class="upload-btn-pill" onclick="reviewWrong()" ${r.score===r.total?'disabled style="opacity:.5"':''}>📝 Ôn câu sai</button>
    </div>
  </div>
  <div style="font-size:13px;font-weight:700;color:var(--text3);letter-spacing:.06em;margin-bottom:12px">CHI TIẾT TỪNG CÂU</div>
  <div class="detail-list">${details}</div>
</div>`;
}

function restartFromResult() { ST.page = "quiz-start"; navigate("quiz-start"); }
function reviewWrong() {
  const wrong = ST.result.details.filter(d=>!d.ok).length;
  if (!wrong) return;
  ST.numQ = Math.min(wrong, 20);
  startQuiz();
}

// ────────────────────────────────────────
//  HISTORY
// ────────────────────────────────────────
function renderHistory() {
  if (!ST.history.length) return `<div class="page">
  <div class="topbar"><div class="greeting">Lịch sử</div></div>
  <div class="card" style="text-align:center;padding:48px;color:var(--text3)">📭 Chưa có lịch sử ôn tập</div>
</div>`;

  const avg = Math.round(ST.history.reduce((a,h)=>a+h.percent,0)/ST.history.length);
  const best = Math.max(...ST.history.map(h=>h.percent));

  const rows = ST.history.map((h,i) => {
    const color = h.percent>=80?'var(--green)':h.percent>=60?'var(--secondary)':'var(--red)';
    const barColor = h.percent>=80?'#10b981':h.percent>=60?'#f59e0b':'#ef4444';
    return `<tr style="animation:fadeUp .3s ease ${i*.04}s both">
      <td><b>${ST.history.length-i}</b></td>
      <td style="font-family:Outfit;font-size:18px;font-weight:800;color:${color}">${h.percent}%</td>
      <td><b>${h.score}</b><span style="color:var(--text3)">/${h.total}</span>
        <div class="pct-bar" style="max-width:120px"><div class="pct-fill" style="width:${h.percent}%;background:${barColor}"></div></div>
      </td>
      <td style="color:var(--text3)">${h.date}</td>
      <td>${h.time_taken?`${Math.floor(h.time_taken/60)}p${h.time_taken%60}s`:'-'}</td>
    </tr>`;
  }).join('');

  return `<div class="page">
  <div class="topbar">
    <div><div class="greeting">Lịch sử</div><div style="font-size:13px;color:var(--text3)">${ST.history.length} lần thi</div></div>
    <button class="btn-outline" style="padding:8px 16px;font-size:13px;color:var(--red);border-color:#fecaca" onclick="clearHistory()">🗑 Xóa</button>
  </div>
  <div class="dashboard-grid stagger" style="grid-template-columns:1fr 1fr 1fr;margin-bottom:18px">
    <div class="stat-card"><div class="stat-icon blue">📊</div><div><div class="stat-n" style="color:var(--primary)">${ST.history.length}</div><div class="stat-l">Lần thi</div></div></div>
    <div class="stat-card"><div class="stat-icon green">💯</div><div><div class="stat-n" style="color:var(--green)">${avg}%</div><div class="stat-l">Trung bình</div></div></div>
    <div class="stat-card"><div class="stat-icon amber">🏆</div><div><div class="stat-n" style="color:var(--secondary)">${best}%</div><div class="stat-l">Cao nhất</div></div></div>
  </div>
  <div class="card">
    <div class="card-head"><div class="card-title">Chi tiết các lần thi</div></div>
    <table class="hist-table">
      <thead><tr><th>#</th><th>Điểm</th><th>Kết quả</th><th>Ngày</th><th>Thời gian</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>
</div>`;
}

function afterHistory() {
  setTimeout(() => {
    document.querySelectorAll('.pct-fill').forEach(el => {
      const w = el.style.width;
      el.style.width = '0';
      requestAnimationFrame(() => { el.style.width = w; });
    });
  }, 200);
}

async function clearHistory() {
  if (!confirm("Xóa toàn bộ lịch sử?")) return;
  await fetch(`${API}/history/clear`, { method: "DELETE" });
  ST.history = [];
  toast("Đã xóa lịch sử", "ok");
  renderPage();
}

// ────────────────────────────────────────
//  UPLOAD
// ────────────────────────────────────────
function renderUpload() {
  return `<div class="page">
  <div class="topbar">
    <div><div class="greeting">Tệp đã tải</div><div style="font-size:13px;color:var(--text3)">Quản lý ngân hàng câu hỏi</div></div>
    <button class="btn-danger" onclick="clearQuestions()">🗑 Xóa câu hỏi</button>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px">
    <div class="stat-card"><div class="stat-icon blue">📚</div><div><div class="stat-n" style="color:var(--primary)">${ST.stats.total_questions||0}</div><div class="stat-l">Câu hỏi</div></div></div>
    <div class="stat-card"><div class="stat-icon green">✅</div><div><div class="stat-n" style="color:var(--green)">${ST.stats.with_answer||0}</div><div class="stat-l">Có đáp án</div></div></div>
  </div>
  <div class="card" style="margin-bottom:18px">
    <div class="upload-drop" id="upload-zone" onclick="$('file-input').click()">
      <div style="font-size:48px;margin-bottom:12px;animation:float 3s ease-in-out infinite">📂</div>
      <div style="font-size:17px;font-weight:700;margin-bottom:6px">Kéo thả file vào đây</div>
      <div style="font-size:13px;color:var(--text3)">Hỗ trợ Word (.docx) và PDF · Nhiều file cùng lúc</div>
      <input type="file" id="file-input" accept=".docx,.pdf" multiple onchange="handleFiles(this.files)" style="display:none">
      <button class="btn-primary" style="margin-top:16px" onclick="event.stopPropagation();$('file-input').click()">Chọn file</button>
    </div>
    <div id="file-list" style="margin-top:12px"></div>
    <div id="upload-result" style="display:none;margin-top:12px;padding:14px 18px;border-radius:12px;font-size:14px;font-weight:600"></div>
  </div>
  <div class="card">
    <div class="card-head">
      <div class="card-title">ĐỊNH DẠNG HỖ TRỢ</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div style="background:var(--bg);border-radius:12px;padding:16px">
        <div style="font-weight:700;margin-bottom:8px">📄 Word (.docx)</div>
        <ul style="font-size:13px;color:var(--text2);line-height:2;list-style:none">
          <li>✓ Câu hỏi đánh số 1. 2. 3...</li>
          <li>✓ Đáp án A. B. C. D.</li>
          <li>✓ Bảng đáp án cuối trang</li>
          <li>✓ Đáp án inline "Đáp án: A"</li>
        </ul>
      </div>
      <div style="background:var(--bg);border-radius:12px;padding:16px">
        <div style="font-weight:700;margin-bottom:8px">📋 PDF</div>
        <ul style="font-size:13px;color:var(--text2);line-height:2;list-style:none">
          <li>✓ PDF có text chọn được</li>
          <li>✓ Đáp án đúng tô màu đỏ</li>
          <li>✓ Đáp án inline</li>
          <li>✗ PDF scan (ảnh) chưa hỗ trợ</li>
        </ul>
      </div>
    </div>
  </div>
</div>`;
}

function bindUpload() {
  const zone = $("upload-zone");
  if (!zone) return;
  zone.addEventListener("dragover", e => { e.preventDefault(); zone.classList.add("drag"); });
  zone.addEventListener("dragleave", () => zone.classList.remove("drag"));
  zone.addEventListener("drop", e => { e.preventDefault(); zone.classList.remove("drag"); handleFiles(e.dataTransfer.files); });
}

async function handleFiles(files) {
  if (!files?.length) return;
  const list = $("file-list");
  const res  = $("upload-result");
  list.innerHTML = '';
  res.style.display = 'none';
  let totalAdded = 0, totalParsed = 0;

  for (const f of files) {
    const item = document.createElement("div");
    item.className = "file-item";
    item.innerHTML = `<span class="file-icon">${f.name.endsWith('.pdf')?'📋':'📄'}</span>
      <div><div class="file-name">${f.name}</div><div class="file-status">Đang xử lý...</div></div>
      <span class="file-badge" style="background:#fef3c7;color:#92400e">⏳</span>`;
    list.appendChild(item);

    const fd = new FormData(); fd.append("file", f);
    try {
      const r = await fetch(`${API}/upload`, { method: "POST", body: fd });
      const d = await r.json();
      if (r.ok) {
        totalAdded += d.added; totalParsed += d.parsed;
        item.querySelector('.file-status').textContent = `${d.parsed} câu · +${d.added} mới`;
        item.querySelector('.file-badge').style.cssText = 'background:#d1fae5;color:#065f46';
        item.querySelector('.file-badge').textContent = '✓';
      } else {
        item.querySelector('.file-status').textContent = d.detail;
        item.querySelector('.file-badge').style.cssText = 'background:#fee2e2;color:#991b1b';
        item.querySelector('.file-badge').textContent = '✗';
      }
    } catch(e) {
      item.querySelector('.file-status').textContent = "Lỗi kết nối";
      item.querySelector('.file-badge').textContent = '✗';
    }
  }

  res.style.display = 'block';
  res.style.cssText = 'display:block;margin-top:12px;padding:14px 18px;border-radius:12px;font-size:14px;font-weight:600;background:#d1fae5;border:1px solid #a7f3d0;color:#065f46';
  res.textContent = `✅ Xong! Nhận dạng ${totalParsed} câu · Thêm mới ${totalAdded} câu`;
  toast(`Thêm ${totalAdded} câu hỏi mới!`, "ok");
  await loadStats();
}

async function clearQuestions() {
  if (!confirm("Xóa toàn bộ câu hỏi?")) return;
  await fetch(`${API}/questions/clear`, { method: "DELETE" });
  await loadStats();
  toast("Đã xóa câu hỏi", "ok");
  renderPage();
}

// ────────────────────────────────────────
//  SETTINGS
// ────────────────────────────────────────
function renderSettings() {
  return `<div class="page">
  <div class="topbar"><div class="greeting">Cài đặt</div></div>
  <div class="card" style="max-width:560px">
    <div class="card-title" style="margin-bottom:4px">TÀI KHOẢN</div>
    <div class="setting-row">
      <div><div class="setting-label">Tên hiển thị</div><div class="setting-desc">${ST.userName}</div></div>
      <button class="btn-outline" style="padding:7px 16px;font-size:13px" onclick="openProfile()">Đổi tên</button>
    </div>
    <div class="card-title" style="margin:20px 0 4px">TRẢI NGHIỆM</div>
    <div class="setting-row">
      <div><div class="setting-label">Tự động sang câu tiếp</div><div class="setting-desc">Chuyển câu sau khi chọn đáp án</div></div>
      <div class="toggle ${ST.settingAutoNext?'on':''}" id="toggle-autonext" onclick="toggleSetting('autonext')"></div>
    </div>
    <div class="setting-row">
      <div><div class="setting-label">Âm thanh</div><div class="setting-desc">Phát âm khi chọn đáp án</div></div>
      <div class="toggle ${ST.settingSound?'on':''}" id="toggle-sound" onclick="toggleSetting('sound')"></div>
    </div>
    <div class="card-title" style="margin:20px 0 4px">DỮ LIỆU</div>
    <div class="setting-row">
      <div><div class="setting-label">Xóa lịch sử</div><div class="setting-desc">${ST.history.length} bản ghi</div></div>
      <button class="btn-danger" style="padding:7px 16px;font-size:13px" onclick="clearHistory()">Xóa</button>
    </div>
    <div class="setting-row">
      <div><div class="setting-label">Xóa câu hỏi</div><div class="setting-desc">${ST.stats.total_questions||0} câu hỏi</div></div>
      <button class="btn-danger" style="padding:7px 16px;font-size:13px" onclick="clearQuestions()">Xóa</button>
    </div>
  </div>
</div>`;
}

function toggleSetting(key) {
  if (key === 'autonext') {
    ST.settingAutoNext = !ST.settingAutoNext;
    localStorage.setItem("qm_autonext", ST.settingAutoNext);
    $("toggle-autonext")?.classList.toggle("on", ST.settingAutoNext);
  } else if (key === 'sound') {
    ST.settingSound = !ST.settingSound;
    localStorage.setItem("qm_sound", ST.settingSound);
    $("toggle-sound")?.classList.toggle("on", ST.settingSound);
  }
}

// ── Init ──
(async () => {
  await loadStats();
  await loadHistory();
  updateNameUI();
  renderPage();
})();
</script>
</body>
</html>
